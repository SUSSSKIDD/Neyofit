version: "3.9"

services:
  mongodb:
    image: mongo:latest
    container_name: neyofit-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: neyofit_user
      MONGO_INITDB_ROOT_PASSWORD: neyofit_secure_pass
      MONGO_INITDB_DATABASE: neyofit
    ports:
      - "27017:27017" # Exposed temporarily for debugging/connecting locally. Remove if unneeded.
    volumes:
      - /srv/projects/pratyush/neyofit/mongodb_data:/data/db
    networks:
      - neyofit-docker-net

networks:
  neyofit-docker-net:
    external: true
